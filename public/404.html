<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bogdan Vujić — Frontend Software Engineer</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current URL and converts the path and query
      // string into just a query string, then redirects the browser to the new
      // URL with only a query string and hash fragment. GitHub Pages serves this
      // 404.html for any unknown path, and index.html restores the real path.
      //
      // pathSegmentsToKeep is the number of path segments to preserve at the
      // root — for a project page served at /portfolio-website/ it must be 1.
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
